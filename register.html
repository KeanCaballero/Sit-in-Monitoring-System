<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCS | Register</title>

  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style-bootstrap.css">
</head>
<body class="bg-light min-vh-100">
  <nav class="navbar navbar-expand-lg navbar-dark" style="background: #1e3a8a;">
    <div class="container-fluid">
      <span class="navbar-brand fw-semibold">College of Computer Studies Sit-in Monitoring System</span>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#">Community</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html">Login</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-xl-10">
        <div class="card shadow-lg border-0 rounded-4 position-relative">
          <a href="index.html" class="btn btn-danger position-absolute top-0 start-0 m-3 z-3 fw-semibold px-4 py-2 rounded-3">← Back</a>
          
          <div class="card-body p-5">
            <div class="row align-items-center">
              <div class="col-lg-7">
                <h1 class="h2 fw-bold text-center mb-5 text-dark">Sign up</h1>
                
                <form id="register-form">
                  <!-- 1. ID Number -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">ID Number</label>
                    <div class="form-floating">
                      <input type="text" class="form-control" id="idNumber" name="idNumber" required>
                      <label for="idNumber">ID Number</label>
                    </div>
                  </div>

                  <!-- 2. Last Name -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">Last Name</label>
                    <div class="form-floating">
                      <input type="text" class="form-control" id="lastName" name="lastName" required>
                      <label for="lastName">Last Name</label>
                    </div>
                  </div>

                  <!-- 3. First Name -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">First Name</label>
                    <div class="form-floating">
                      <input type="text" class="form-control" id="firstName" name="firstName" required>
                      <label for="firstName">First Name</label>
                    </div>
                  </div>

                  <!-- 4. Middle Name -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">Middle Name</label>
                    <div class="form-floating">
                      <input type="text" class="form-control" id="middleName" name="middleName">
                      <label for="middleName">Middle Name</label>
                    </div>
                  </div>

                  <!-- 5. Course (DROPDOWN) -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">Course</label>
                    <div class="form-floating">
                      <select class="form-select" id="course" name="course" required>
                        <option value="" disabled selected>Choose your course</option>
                        <option value="BSIT">BSIT - Information Technology</option>
                        <option value="BSCS">BSCS - Computer Science</option>
                        <option value="BSE">BSE - Engineering</option>
                        <option value="BSN">BSN - Nursing</option>
                        <option value="BSA">BSA - Accountancy</option>
                      </select>
                      <label for="course">Course</label>
                    </div>
                  </div>

                  <!-- 6. Course Level -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">Course Level</label>
                    <div class="form-floating">
                      <input type="number" class="form-control" id="courseLevel" name="courseLevel" value="1" min="1" max="5" required>
                      <label for="courseLevel">Course Level</label>
                    </div>
                  </div>

                  <!-- 7. Email -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">Email</label>
                    <div class="form-floating">
                      <input type="email" class="form-control" id="email" name="email" required>
                      <label for="email">Email</label>
                    </div>
                  </div>

                  <!-- 8. Address -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">Address</label>
                    <div class="form-floating">
                      <input type="text" class="form-control" id="address" name="address" required>
                      <label for="address">Address</label>
                    </div>
                  </div>

                  <!-- 9. Password -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">Password</label>
                    <div class="form-floating">
                      <input type="password" class="form-control" id="password" name="password" required>
                      <label for="password">Password</label>
                    </div>
                  </div>

                  <!-- 10. Repeat Password -->
                  <div class="mb-4">
                    <label class="form-label fw-medium text-muted">Repeat Password</label>
                    <div class="form-floating">
                      <input type="password" class="form-control" id="repeatPassword" name="repeatPassword" required>
                      <label for="repeatPassword">Repeat your password</label>
                    </div>
                  </div>

                  <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold py-3">Register</button>
                </form>
              </div>

              <div class="col-lg-5 d-none d-lg-flex align-items-center justify-content-center">

                  <circle cx="121" cy="59" r="7" fill="#9aa8c9"/>

                  <rect x="144" y="102" width="8" height="8" rx="2" fill="#9aa8c9"/>
                  <rect x="156" y="102" width="8" height="8" rx="2" fill="#c5cfe0"/>
                  <rect x="124" y="120" width="48" height="16" rx="4" fill="#ef4444"/>
                  <text x="148" y="131" text-anchor="middle" fill="#fff" font-size="7" font-family="sans-serif" font-weight="600">Sign Up</text>

              </div>
            </div>
          </div>
        </div>
      </div>
