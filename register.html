<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCS | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand fw-semibold d-flex align-items-center" href="index.html" style="font-size:.9rem; text-decoration: none;">
      <img src="images/UC_LOGO.png" alt="UC Logo" class="nav-logo me-2" onerror="this.src='images/UC_LOGO.jpg'; this.onerror=null;"/>
      College of Computer Studies Sit-in Monitoring System
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Community ▾</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html">Login</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Register</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main -->
  <div class="d-flex justify-content-center align-items-start py-4 px-3 register-wrapper">
    <div class="register-card bg-white">
      <!-- Header -->
      <div class="card-header-ccs d-flex align-items-center justify-content-between">
        <div>
          <h1 class="mb-1">Create your account</h1>
          <p>Fill in your details to get started with the sit-in system</p>
        </div>
        <a href="index.html" class="btn-back">← Back</a>
      </div>

      <!-- Body -->
      <div class="p-4 p-md-5">
        <form id="register-form">
          <!-- Personal Info -->
          <p class="section-heading">Personal Information</p>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="idNumber" class="form-label">ID Number</label>
              <input type="text" class="form-control" id="idNumber" name="idNumber" placeholder="e.g. 20-1234-567" required/>
            </div>
            <div class="col-md-6">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required/>
            </div>
            <div class="col-md-4">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Dela Cruz" required/>
            </div>
            <div class="col-md-4">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Juan" required/>
            </div>
            <div class="col-md-4">
              <label for="middleName" class="form-label">
                Middle Name <span class="text-muted fw-normal" style="font-size:.7rem;">(optional)</span>
              </label>
              <input type="text" class="form-control" id="middleName" name="middleName" placeholder="Santos"/>
            </div>
            <div class="col-12">
              <label for="address" class="form-label">Address</label>
              <input type="text" class="form-control" id="address" name="address" placeholder="City, Province" required/>
            </div>
          </div>

          <!-- Academic Details -->
          <p class="section-heading">Academic Details</p>
          <div class="row g-3">
            <div class="col-md-8">
              <label for="course" class="form-label">Course</label>
              <select class="form-select" id="course" name="course" required>
                <option value="" disabled selected>Choose your course</option>
                <option value="BSIT">BSIT — Information Technology</option>
                <option value="BSCS">BSCS — Computer Science</option>
                <option value="BSE">BSE — Engineering</option>
                <option value="BSN">BSN — Nursing</option>
                <option value="BSA">BSA — Accountancy</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="courseLevel" class="form-label">Year Level</label>
              <select class="form-select" id="courseLevel" name="courseLevel" required>
                <option value="" disabled selected>Select year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
                <option value="5">5th Year</option>
              </select>
            </div>
          </div>

          <!-- Security -->
          <p class="section-heading">Security</p>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Min. 8 characters" required/>
              <div class="strength-bar mt-2">
                <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
              </div>
            </div>
            <div class="col-md-6">
              <label for="repeatPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="repeatPassword" name="repeatPassword" placeholder="Repeat your password" required/>
            </div>
          </div>

          <!-- Footer -->
          <div class="form-footer d-flex align-items-center justify-content-between flex-wrap gap-3">
            <p class="signin-hint mb-0">Already have an account? <a href="index.html">Sign in here</a></p>
            <button type="submit" class="btn btn-ccs text-white">Create Account →</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
